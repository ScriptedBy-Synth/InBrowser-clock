<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hardware 7-Segment Clock</title>
    <style>
        body { background: #040000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .clock-case { background: #0b0000; border: 0.5vw solid #220000; border-radius: 1vw; padding: 4vw 5vw; box-shadow: 0 0 8px rgba(255,0,0,0.1), inset 0 0 6vw #000; display: flex; align-items: center; gap: 1vw; transform: skewX(-6deg); }
        .digit { position: relative; width: 6.5vw; height: 11vw; margin: 0 0.5vw; }
        .segment { position: absolute; background: #1a0202; border-radius: 0.3vw; transition: 0.05s; }
        .segment.on { background: #ff0000; box-shadow: 0 0 2vw #ff0000, 0 0 4vw rgba(255,0,0,0.4); }
        .seg-a { top: 0; left: 0.6vw; right: 0.6vw; height: 0.9vw; clip-path: polygon(0% 100%, 15% 0%, 85% 0%, 100% 100%); }
        .seg-b { top: 0.6vw; right: 0; bottom: 52%; width: 0.9vw; clip-path: polygon(0% 0%, 100% 12%, 100% 88%, 0% 100%); }
        .seg-c { top: 52%; right: 0; bottom: 0.6vw; width: 0.9vw; clip-path: polygon(0% 0%, 100% 12%, 100% 88%, 0% 100%); }
        .seg-d { bottom: 0; left: 0.6vw; right: 0.6vw; height: 0.9vw; clip-path: polygon(0% 0%, 15% 100%, 85% 100%, 100% 0%); }
        .seg-e { top: 52%; left: 0; bottom: 0.6vw; width: 0.9vw; clip-path: polygon(100% 0%, 0% 12%, 0% 88%, 100% 100%); }
        .seg-f { top: 0.6vw; left: 0; bottom: 52%; width: 0.9vw; clip-path: polygon(100% 0%, 0% 12%, 0% 88%, 100% 100%); }
        .seg-f { top: 0.6vw; left: 0; bottom: 52%; width: 0.9vw; clip-path: polygon(100% 0%, 0% 12%, 0% 88%, 100% 100%); }
        .seg-g { top: calc(50% - 0.45vw); left: 0.7vw; right: 0.7vw; height: 0.9vw; clip-path: polygon(12% 50%, 0% 0%, 88% 0%, 100% 50%, 88% 100%, 0% 100%); }
        .colon { display: flex; flex-direction: column; gap: 2.2vw; width: 2vw; height: 11vw; justify-content: center; align-items: center; }
        .dot { width: 0.9vw; height: 0.9vw; background: #ff0000; border-radius: 50%; box-shadow: 0 0 2vw #ff0000; }
        .ampm-box { display: flex; flex-direction: column; gap: 1.5vw; margin-left: 2vw; font-family: sans-serif; font-size: 2.2vw; font-weight: bold; color: #1a0202; }
        .indicator.on { color: #ff0000; text-shadow: 0 0 1.5vw #ff0000; }
    </style>
</head>
<body>
    <div class="clock-case" id="clock">
        <div class="ampm-box"><div id="am" class="indicator">AM</div><div id="pm" class="indicator">PM</div></div>
    </div>

    <script>
        const maps = ["1111110","0110000","1101101","1111001","0110011","1011011","1011111","1110000","1111111","1111011"];
        const classes = ['a','b','c','d','e','f','g'];
        const clock = document.getElementById('clock');
        
        ['s2','s1',':','m2','m1',':','h2','h1'].forEach(id => {
            if (id === ':') return clock.insertAdjacentHTML('afterbegin', '<div class="colon"><div class="dot"></div><div class="dot"></div></div>');
            let divs = classes.map(c => `<div class="segment seg-${c}"></div>`).join('');
            clock.insertAdjacentHTML('afterbegin', `<div class="digit" id="${id}">${divs}</div>`);
        });

        let internal = new Date(), target = new Date(), lastFrame = performance.now();
        let timelineOffset = 0, initialLandingPause = 0, lastMode = '', lastTime = '';

        function loop(now) {
            let dt = Math.min(now - lastFrame, 100); lastFrame = now;
            
            // Read remote live layout parameter modifications from dashboard panel
            let mode = localStorage.getItem('clock_mode') || 'live';
            let tStr = localStorage.getItem('clock_override_time');
            let tickSpeed = parseFloat(localStorage.getItem('clock_tick_speed') || '1');
            let isPaused = localStorage.getItem('clock_is_paused') === 'true';

            // Reset operational timelines if target context fields flip
            if (mode !== lastMode || (mode === 'custom' && tStr !== lastTime)) {
                if (mode === 'custom') {
                    let [h, m, s] = tStr.split(':').map(Number);
                    target.setHours(h, m, s, 0); 
                    timelineOffset = 0; 
                    initialLandingPause = 0;
                }
                lastMode = mode; lastTime = tStr;
            }

            // Calculate moving target markers depending on selected state variables
            if (mode === 'live') {
                if (!isPaused) {
                    // Let live time drift forward by custom speed parameters
                    timelineOffset += dt * (tickSpeed - 1);
                } else {
                    // Lock time tracking solid if pause status is true
                    timelineOffset -= dt;
                }
                target = new Date(Date.now() + timelineOffset);
            } else if (mode === 'custom' && tStr) {
                let [h, m, s] = tStr.split(':').map(Number); 
                target.setHours(h, m, s, 0);
                
                // Track post-animation flow sequences if initial landing lock has cleared
                if (initialLandingPause >= 2000) {
                    if (!isPaused) {
                        timelineOffset += dt * tickSpeed;
                    }
                }
                target = new Date(target.getTime() + timelineOffset);
            }

            let diff = target - internal;
            if (diff > 43200000) diff -= 86400000; if (diff < -43200000) diff += 86400000;

            // Handle the catch-up fast-forward animation independently of speed controls
            if (Math.abs(diff) > 50) {
                let step = diff * (1.8 * (dt / 1000)), pace = 1000 * (dt / 1000) * Math.sign(diff);
                if (Math.abs(diff) < 45000 && Math.abs(step) < Math.abs(pace)) step = pace;
                internal = new Date(Math.abs(step) > Math.abs(diff) ? target.getTime() : internal.getTime() + step);
            } else {
                internal = new Date(target.getTime());
                if (mode === 'custom' && initialLandingPause < 2000) {
                    initialLandingPause += dt;
                }
            }

            let h24 = internal.getHours(), h12 = h24 % 12 || 12;
            let h = String(h12).padStart(2,'0'), m = String(internal.getMinutes()).padStart(2,'0'), s = String(internal.getSeconds()).padStart(2,'0');

            [['h1',h.charAt(0)],['h2',h.charAt(1)],['m1',m.charAt(0)],['m2',m.charAt(1)],['s1',s.charAt(0)],['s2',s.charAt(1)]].forEach(([id, val]) => {
                classes.forEach((c, i) => document.getElementById(id).querySelector(`.seg-${c}`).classList.toggle('on', maps[val][i] === '1'));
            });

            document.getElementById('pm').classList.toggle('on', h24 >= 12);
            document.getElementById('am').classList.toggle('on', h24 < 12);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
